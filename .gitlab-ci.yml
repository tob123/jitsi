image: $BUILD_REGISTRY_PRD/proxy-cache/docker:26-cli
variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
services:
  - name: $BUILD_REGISTRY_PRD/proxy-cache/docker:26-dind
    alias: docker
.builder:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - changes:
      - README.md
      - sample
      when: never
    - if: $CI_PIPELINE_SOURCE == "push"
      when: always
  before_script:
    - docker info
    - |
      apk add \
      openssl \
      curl \
      jq \
      trivy --repository=http://dl-cdn.alpinelinux.org/alpine/edge/testing \
      bash
    - curl -LO https://storage.googleapis.com/container-diff/latest/container-diff-linux-amd64
    - chmod +x container-diff-linux-amd64
    - mv container-diff-linux-amd64 /usr/local/bin/container-diff
  script:
    - docker --version
    - source buildenvironment
    - source get_versions.sh
    - source set_versions.sh
    - bash pull.sh
    - docker compose build
    - docker compose up -d
    - docker ps -q --filter health=starting --filter health=unhealthy --filter health=none
    - bash ci_health.sh
    - docker ps -q -a --filter "exited=1"
    - docker ps -q -a --filter "status=exited"
    - docker container ls
    - docker-compose logs
    - echo "$REPO_HUB_P" | docker login $BUILD_REGISTRY -u "$REPO_HUB_U" --password-stdin
    - docker-compose logs
#    - bash compare.sh
    - bash scan.sh
    - bash push.sh
build-job-1:
  tags:
    - rootless_docker_privileged
  extends: .builder
  parallel:
    matrix:
      - VERSION: LATEST
        S6_VERSION: ["3.2"]
